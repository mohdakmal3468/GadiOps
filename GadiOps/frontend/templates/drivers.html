<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>GadiOps | Driver Registry</title>

    <link rel="stylesheet"
          href="../assets/css/styles.css">

</head>

<body>

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="logo">

            <h2>🚛 GadiOps</h2>

        </div>

        <nav>

            <a href="dashboard.html">🏠 Dashboard</a>

            <a href="vehicles.html">🚛 Vehicles</a>

            <a href="drivers.html" class="active">👨 Drivers</a>

            <a href="trips.html">🛣 Trips</a>

            <a href="expenses.html">💰 Expenses</a>

        </nav>

    </aside>

    <!-- Main Content -->

    <main class="main-content">

        <header class="topbar">

            <h1>Driver Registry</h1>

            <button
                class="logout-btn"
                onclick="logout()">

                Logout

            </button>

        </header>

        <!-- Driver Registration -->

        <section class="trip-form-card">

            <h2>Register New Driver</h2>

            <form id="driverForm">

                <div class="form-grid">

                    <div class="form-group">

                        <label for="driverName">

                            Driver Name

                        </label>

                        <input
                            type="text"
                            id="driverName"
                            required>

                    </div>

                    <div class="form-group">

                        <label for="licenseNumber">

                            License Number

                        </label>

                        <input
                            type="text"
                            id="licenseNumber"
                            required>

                    </div>

                    <div class="form-group">

                        <label for="licenseCategory">

                            License Category

                        </label>

                        <select
                            id="licenseCategory"
                            required>

                            <option value="">Select Category</option>

                            <option>LMV</option>

                            <option>HMV</option>

                            <option>Transport</option>

                        </select>

                    </div>

                    <div class="form-group">

                        <label for="licenseExpiry">

                            License Expiry

                        </label>

                        <input
                            type="date"
                            id="licenseExpiry"
                            required>

                    </div>

                    <div class="form-group">

                        <label for="contactNumber">

                            Contact Number

                        </label>

                        <input
                            type="tel"
                            id="contactNumber"
                            required>

                    </div>

                    <div class="form-group">

                        <label for="safetyScore">

                            Safety Score

                        </label>

                        <input
                            type="number"
                            id="safetyScore"
                            min="0"
                            max="100"
                            required>

                    </div>

                    <div class="form-group">

                        <label for="driverStatus">

                            Status

                        </label>

                        <select
                            id="driverStatus"
                            required>

                            <option>Available</option>

                            <option>On Trip</option>

                            <option>Off Duty</option>

                            <option>Suspended</option>

                        </select>

                    </div>

                </div>

                <button
                    class="primary-btn"
                    type="submit">

                    Register Driver

                </button>

            </form>

        </section>

        <!-- Driver Table -->

        <section class="table-card">

            <div class="table-header">

                <h2>Driver Registry</h2>

            </div>

            <table>

                <thead>

                    <tr>

                        <th>Name</th>

                        <th>License</th>

                        <th>Category</th>

                        <th>Expiry</th>

                        <th>Contact</th>

                        <th>Safety</th>

                        <th>Status</th>

                    </tr>

                </thead>

                <tbody id="driverTableBody">

                    <!-- Dynamic Rows -->

                </tbody>

            </table>

        </section>

    </main>

    <script src="../assets/js/api.js"></script>

    <script src="../assets/js/auth.js"></script>

    <script src="../assets/js/utils.js"></script>

    <script>

        checkAuth();

    </script>

</body>

</html>
