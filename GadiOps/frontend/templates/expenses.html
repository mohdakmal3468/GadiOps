<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>GadiOps | Expense Management</title>

    <link rel="stylesheet"
          href="../assets/css/styles.css">

</head>

<body>

    <aside class="sidebar">

        <div class="logo">

            <h2>🚛 GadiOps</h2>

        </div>

        <nav>

            <a href="dashboard.html">🏠 Dashboard</a>

            <a href="vehicles.html">🚛 Vehicles</a>

            <a href="drivers.html">👨 Drivers</a>

            <a href="trips.html">🛣 Trips</a>

            <a href="expenses.html" class="active">💰 Expenses</a>

        </nav>

    </aside>

    <main class="main-content">

        <header class="topbar">

            <h1>Expense Management</h1>

            <button
                class="logout-btn"
                onclick="logout()">

                Logout

            </button>

        </header>

        <!-- Expense Summary -->

        <section class="kpi-grid">

            <div class="kpi-card">

                <h3>Total Expense</h3>

                <h2 id="totalExpense">₹0</h2>

            </div>

            <div class="kpi-card">

                <h3>Fuel Cost</h3>

                <h2 id="fuelExpense">₹0</h2>

            </div>

            <div class="kpi-card">

                <h3>Maintenance</h3>

                <h2 id="maintenanceExpense">₹0</h2>

            </div>

            <div class="kpi-card">

                <h3>Toll</h3>

                <h2 id="tollExpense">₹0</h2>

            </div>

        </section>

        <!-- Expense Form -->

        <section class="trip-form-card">

            <h2>Add Expense</h2>

            <form id="expenseForm">

                <div class="form-grid">

                    <div class="form-group">

                        <label for="vehicle">

                            Vehicle

                        </label>

                        <select
                            id="vehicle"
                            required>

                            <option value="">

                                Select Vehicle

                            </option>

                        </select>

                    </div>

                    <div class="form-group">

                        <label for="expenseType">

                            Expense Type

                        </label>

                        <select
                            id="expenseType"
                            required>

                            <option value="">Select Type</option>

                            <option>Fuel</option>

                            <option>Maintenance</option>

                            <option>Toll</option>

                            <option>Insurance</option>

                            <option>Other</option>

                        </select>

                    </div>

                    <div class="form-group">

                        <label for="amount">

                            Amount (₹)

                        </label>

                        <input
                            type="number"
                            id="amount"
                            required>

                    </div>

                    <div class="form-group">

                        <label for="fuelQuantity">

                            Fuel (Litres)

                        </label>

                        <input
                            type="number"
                            id="fuelQuantity"
                            placeholder="Optional">

                    </div>

                    <div class="form-group">

                        <label for="odometerReading">

                            Odometer (Km)

                        </label>

                        <input
                            type="number"
                            id="odometerReading"
                            placeholder="Optional">

                    </div>

                    <div class="form-group">

                        <label for="expenseDate">

                            Date

                        </label>

                        <input
                            type="date"
                            id="expenseDate"
                            required>

                    </div>

                    <div class="form-group"
                         style="grid-column:1/-1;">

                        <label for="description">

                            Description

                        </label>

                        <textarea
                            id="description"
                            rows="4"></textarea>

                    </div>

                </div>

                <button
                    class="primary-btn"
                    type="submit">

                    Save Expense

                </button>

            </form>

        </section>

        <!-- Expense Ledger -->

        <section class="table-card">

            <div class="table-header">

                <h2>Expense Ledger</h2>

                <button
                    id="exportBtn"
                    class="primary-btn">

                    Export CSV

                </button>

            </div>

            <table>

                <thead>

                    <tr>

                        <th>Vehicle</th>

                        <th>Type</th>

                        <th>Amount</th>

                        <th>Fuel(L)</th>

                        <th>Odometer</th>

                        <th>Date</th>

                        <th>Description</th>

                    </tr>

                </thead>

                <tbody id="expenseTableBody">

                </tbody>

            </table>

        </section>

    </main>

    <script src="../assets/js/api.js"></script>

    <script src="../assets/js/auth.js"></script>

    <script src="../assets/js/utils.js"></script>

    <script>

        checkAuth();

    </script>

</body>

</html>
