<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>GadiOps | Trip Management</title>

    <link rel="stylesheet" href="../assets/css/styles.css">

</head>

<body>

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="logo">
            <h2>🚛 GadiOps</h2>
        </div>

        <nav>

            <a href="dashboard.html">🏠 Dashboard</a>

            <a href="vehicles.html">🚛 Vehicles</a>

            <a href="drivers.html">👨 Drivers</a>

            <a href="trips.html" class="active">🛣 Trips</a>

            <a href="expenses.html">💰 Expenses</a>

        </nav>

    </aside>

    <!-- Main -->

    <main class="main-content">

        <!-- Header -->

        <header class="topbar">

            <h1>Trip Management</h1>

            <button
                class="logout-btn"
                onclick="logout()">

                Logout

            </button>

        </header>

        <!-- Trip Form -->

        <section class="trip-form-card">

            <h2>Create New Trip</h2>

            <form id="tripForm">

                <div class="form-grid">

                    <div class="form-group">

                        <label for="source">Source</label>

                        <input
                            type="text"
                            id="source"
                            placeholder="Enter Source"
                            required>

                    </div>

                    <div class="form-group">

                        <label for="destination">Destination</label>

                        <input
                            type="text"
                            id="destination"
                            placeholder="Enter Destination"
                            required>

                    </div>

                    <div class="form-group">

                        <label for="vehicle">Vehicle</label>

                        <select
                            id="vehicle"
                            required>

                            <option value="">Select Vehicle</option>

                        </select>

                    </div>

                    <div class="form-group">

                        <label for="driver">Driver</label>

                        <select
                            id="driver"
                            required>

                            <option value="">Select Driver</option>

                        </select>

                    </div>

                    <div class="form-group">

                        <label for="cargoWeight">

                            Cargo Weight (Kg)

                        </label>

                        <input
                            type="number"
                            id="cargoWeight"
                            min="1"
                            placeholder="500"
                            required>

                    </div>

                    <div class="form-group">

                        <label for="distance">

                            Planned Distance (Km)

                        </label>

                        <input
                            type="number"
                            id="distance"
                            min="1"
                            placeholder="250"
                            required>

                    </div>

                </div>

                <div class="action-buttons">

                    <button
                        type="submit"
                        class="primary-btn">

                        Save Draft

                    </button>

                    <button
                        type="reset"
                        class="secondary-btn">

                        Clear

                    </button>

                </div>

            </form>

        </section>

        <!-- Trip Board -->

        <section class="trip-board">

            <!-- Draft -->

            <div class="trip-column">

                <div class="column-header">

                    <h2>📝 Draft</h2>

                </div>

                <div id="draftTrips">

                    <!-- Draft Cards -->

                </div>

            </div>

            <!-- Dispatched -->

            <div class="trip-column">

                <div class="column-header">

                    <h2>🚚 Dispatched</h2>

                </div>

                <div id="dispatchedTrips">

                    <!-- Dispatch Cards -->

                </div>

            </div>

            <!-- Completed -->

            <div class="trip-column">

                <div class="column-header">

                    <h2>✅ Completed</h2>

                </div>

                <div id="completedTrips">

                    <!-- Completed Cards -->

                </div>

            </div>

        </section>

    </main>

    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/trips.js"></script>

    <script>

        checkAuth();

    </script>

</body>

</html>
