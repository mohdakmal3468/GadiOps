<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>GadiOps | Dashboard</title>

    <link rel="stylesheet" href="../assets/css/styles.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="logo">
            <h2>🚛 GadiOps</h2>
        </div>

        <nav>

            <a href="dashboard.html" class="active">🏠 Dashboard</a>

            <a href="vehicles.html">🚛 Vehicles</a>

            <a href="drivers.html">👨 Drivers</a>

            <a href="trips.html">🛣 Trips</a>

            <a href="expenses.html">💰 Expenses</a>

        </nav>

    </aside>

    <!-- Main Content -->

    <main class="main-content">

        <!-- Header -->

        <header class="topbar">

            <h1>Dashboard</h1>

            <button onclick="logout()" class="logout-btn">
                Logout
            </button>

        </header>

        <!-- Filters -->

        <section class="filters">

            <div class="filter-group">

                <label for="regionFilter">Region</label>

                <select id="regionFilter" name="region">

                    <option value="all">All Regions</option>
                    <option value="north">North</option>
                    <option value="south">South</option>
                    <option value="east">East</option>
                    <option value="west">West</option>

                </select>

            </div>

            <div class="filter-group">

                <label for="statusFilter">Status</label>

                <select id="statusFilter" name="status">

                    <option value="all">All Status</option>
                    <option value="available">Available</option>
                    <option value="on-trip">On Trip</option>
                    <option value="maintenance">Maintenance</option>

                </select>

            </div>

        </section>

        <!-- KPI Cards -->

        <section class="kpi-grid">

            <div class="kpi-card">

                <h3>Active Vehicles</h3>

                <h2 id="activeVehicles">0</h2>

            </div>

            <div class="kpi-card">

                <h3>Available Vehicles</h3>

                <h2 id="availableVehicles">0</h2>

            </div>

            <div class="kpi-card">

                <h3>Maintenance</h3>

                <h2 id="maintenanceVehicles">0</h2>

            </div>

            <div class="kpi-card">

                <h3>Drivers On Duty</h3>

                <h2 id="driversOnDuty">0</h2>

            </div>

            <div class="kpi-card">

                <h3>Active Trips</h3>

                <h2 id="activeTrips">0</h2>

            </div>

            <div class="kpi-card">

                <h3>Pending Trips</h3>

                <h2 id="pendingTrips">0</h2>

            </div>

            <div class="kpi-card">

                <h3>Fleet Utilization</h3>

                <h2 id="fleetUtilization">0%</h2>

            </div>

        </section>

        <!-- Charts -->

        <section class="chart-section">

            <div class="chart-card">

                <h3>Fleet Overview</h3>

                <canvas id="fleetChart"></canvas>

            </div>

        </section>

    </main>

    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/dashboard.js"></script>

    <script>

        checkAuth();

    </script>

</body>

</html>
